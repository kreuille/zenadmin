name: Deploy Production

on:
  release:
    types: [published]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/omni-gerant-api:${{ steps.version.outputs.tag }}
            ${{ vars.REGISTRY_URL }}/omni-gerant-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/omni-gerant-web:${{ steps.version.outputs.tag }}
            ${{ vars.REGISTRY_URL }}/omni-gerant-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push OCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ocr
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/omni-gerant-ocr:${{ steps.version.outputs.tag }}
            ${{ vars.REGISTRY_URL }}/omni-gerant-ocr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        run: |
          echo "Deploy to production environment"
          # Replace with actual deployment command
