name: Deploy API to Render

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'render.yaml'
      - 'pnpm-lock.yaml'

concurrency:
  group: deploy-render
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK_URL secret not set. Skipping deploy."
            echo "To enable auto-deploy:"
            echo "1. Go to Render dashboard → zenadmin-api → Settings → Deploy Hook"
            echo "2. Copy the hook URL"
            echo "3. Add it as a GitHub secret: RENDER_DEPLOY_HOOK_URL"
            exit 0
          fi
          echo "🚀 Triggering Render deploy..."
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Deploy hook failed"
          echo "✅ Deploy triggered"
