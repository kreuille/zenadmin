name: Deploy Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ vars.REGISTRY_URL }}/zenadmin-api:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ vars.REGISTRY_URL }}/zenadmin-web:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push OCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ocr
          push: true
          tags: ${{ vars.REGISTRY_URL }}/zenadmin-ocr:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging
        run: |
          echo "Deploy to staging environment"
          # Replace with actual deployment command (kubectl, docker-compose, etc.)
