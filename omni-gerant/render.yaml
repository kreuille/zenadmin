databases:
  - name: zenadmin-db
    plan: free
    databaseName: zenadmin
    user: zenadmin

services:
  - type: web
    name: zenadmin-api
    runtime: node
    plan: free
    buildCommand: >-
      pnpm install &&
      pnpm --filter @zenadmin/shared build &&
      pnpm --filter @zenadmin/db build &&
      cd packages/db &&
      npx prisma generate &&
      npx prisma db push --accept-data-loss=false
    startCommand: cd apps/api && node --import tsx src/index.ts
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: https://zenadmin.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: zenadmin-db
          property: connectionString
      - key: KIWIZ_API_URL
        value: https://api.kiwiz.io
