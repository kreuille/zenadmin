services:
  - type: web
    name: zenadmin-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @zenadmin/shared build
    startCommand: cd apps/api && node --import tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: JWT_SECRET
        value: zenadmin-prod-secret-key-at-least-32-characters-long
      - key: CORS_ORIGIN
        value: https://zenadmin.vercel.app
