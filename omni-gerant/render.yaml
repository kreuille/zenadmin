databases:
  - name: zenadmin-db
    plan: free
    databaseName: zenadmin
    user: zenadmin

services:
  - type: web
    name: zenadmin-api
    runtime: node
    plan: free
    buildCommand: >-
      pnpm install &&
      pnpm --filter @omni-gerant/shared build &&
      pnpm --filter @omni-gerant/db build &&
      cd packages/db &&
      npx prisma generate &&
      npx prisma migrate deploy
    startCommand: cd apps/api && node --import tsx src/index.ts
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: https://omni-gerant.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: zenadmin-db
          property: connectionString
