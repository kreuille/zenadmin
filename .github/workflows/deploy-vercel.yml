name: Deploy Vercel (production)

# Auto-deploy le front Next.js sur Vercel a chaque push sur main.
# Remplace l'integration Git native (pas activee : pas de Login Connection
# GitHub cote compte Vercel).
#
# Secrets requis :
#   VERCEL_TOKEN       - token Vercel CLI (vca_...)
#   VERCEL_ORG_ID      - team_e2Xr2mo9D3BWDXNRijJV4c2w
#   VERCEL_PROJECT_ID  - prj_rrWWOdvv2q3x6TpkOZLvDTNrPFvF

on:
  push:
    branches: [main]
    paths:
      - 'omni-gerant/apps/web/**'
      - 'omni-gerant/packages/shared/**'
      - 'omni-gerant/packages/db/**'
      - 'omni-gerant/pnpm-lock.yaml'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omni-gerant
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: omni-gerant/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$url" >> $GITHUB_OUTPUT
          echo "Deployed: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test
        working-directory: .
        run: |
          sleep 8
          code=$(curl -s -o /dev/null -w "%{http_code}" https://omni-gerant.vercel.app/login)
          if [ "$code" != "200" ]; then
            echo "Smoke test failed: /login returned $code"
            exit 1
          fi
          echo "Smoke test OK: /login → 200"
